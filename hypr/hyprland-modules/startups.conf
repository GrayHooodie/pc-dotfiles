source = ~/.config/hypr/hyprland-modules/prog-vars.conf
source = ~/.config/hypr/hyprland-modules/windows-and-workspaces.conf

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $browser
exec-once = $music
exec-once = $terminal
# exec-once = nm-applet &
exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = tailscale up
exec-once = sunshine
exec-once = syncthing serve --no-browser
